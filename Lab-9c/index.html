<!-- 9.c Build a Session Management using JSP program for getting session expiry time and
your name through text box and press submit to display the message by greeting Hello your
name!.
press the following link to check it within the set session time or wait there for the minutes
set to see the session expiry.-->
<!DOCTYPE html>
<html>
<head>
    <title>Session Management</title>
</head>
<body>

<h2>Session Management Example</h2>

<form action="welcome.jsp" method="get">
    Enter your name:
    <input type="text" name="uname" required>

    <br><br>

    Session Expiry Time (seconds):
    <input type="number" name="time" min="10" max="300" required>

    <br><br>

    <input type="submit" value="Start Session">
</form>

</body>
</html>>
